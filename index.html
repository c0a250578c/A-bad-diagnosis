<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 学生の人生ヤバさ診断 🔥</title>
    <meta name="description" content="あなたはまだ人間か、それとも終わっているか...？診断してみよう！">
    <meta name="keywords" content="診断メーカー,学生,人生,ヤバい">

    <!-- OGP Settings for SNS -->
    <meta property="og:title" content="🔥 学生の人生ヤバさ診断 🔥">
    <meta property="og:description" content="あなたの人生ヤバさを診断します...結果がヤバいかも">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://your-domain.github.io/shindan/">
    <meta property="og:image" content="https://your-domain.github.io/shindan/ogp.png">
    <meta property="og:site_name" content="人生ヤバさ診断">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="🔥 学生の人生ヤバさ診断 🔥">
    <meta name="twitter:description" content="診断したら全員終わってたｗｗ">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: linear-gradient(-45deg, #ff006e, #8338ec, #3a86ff, #06ffa5);
            background-size: 400% 400%;
            animation: gradientBG 8s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .app-container {
            width: 100%;
            max-width: 500px;
        }

        .screen {
            background: white;
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow:
                0 25px 50px -12px rgba(0, 0, 0, 0.25),
                0 0 0 4px rgba(255, 255, 255, 0.3) inset;
            position: relative;
            overflow: hidden;
        }

        .screen::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 8px;
            background: linear-gradient(90deg, #ff006e, #8338ec, #3a86ff);
        }

        /* START SCREEN */
        .start-content {
            text-align: center;
        }

        .trend-badge {
            display: inline-block;
            background: linear-gradient(135deg, #ff006e, #8338ec);
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.85em;
            font-weight: 700;
            margin-bottom: 25px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        .main-icon {
            font-size: 6em;
            margin-bottom: 20px;
            animation: bounceIn 1s ease;
        }

        @keyframes bounceIn {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            50% {
                transform: scale(1.2);
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .app-title {
            font-size: 1.9em;
            font-weight: 900;
            color: #1a1a2e;
            margin-bottom: 10px;
            line-height: 1.3;
        }

        .app-subtitle {
            font-size: 1.1em;
            color: #666;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .warning-box {
            background: linear-gradient(135deg, #fff5f5, #fed7d7);
            border: 2px solid #fc8181;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 30px;
            font-size: 0.9em;
            color: #c53030;
            font-weight: 600;
        }

        .feature-list {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .feature-item {
            text-align: center;
            font-size: 0.8em;
            color: #666;
        }

        .feature-item span {
            display: block;
            font-size: 1.8em;
            margin-bottom: 5px;
        }

        /* BUTTONS */
        .btn-primary {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #ff006e, #8338ec);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1.2em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(131, 56, 236, 0.4);
            position: relative;
            overflow: hidden;
        }

        .btn-primary:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 40px rgba(131, 56, 236, 0.5);
        }

        .btn-primary::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transform: rotate(30deg);
            transition: all 0.5s;
        }

        .btn-primary:hover::after {
            left: 100%;
        }

        /* QUIZ SCREEN */
        .progress-container {
            margin-bottom: 30px;
        }

        .progress-bar-bg {
            height: 12px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff006e, #8338ec);
            border-radius: 10px;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .progress-text {
            text-align: center;
            margin-top: 10px;
            font-size: 0.9em;
            color: #666;
            font-weight: 600;
        }

        .question-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .question-number {
            display: inline-block;
            background: linear-gradient(135deg, #ff006e, #8338ec);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .question-emoji {
            font-size: 4em;
            margin-bottom: 10px;
            display: block;
        }

        .question-text {
            font-size: 1.4em;
            font-weight: 700;
            color: #1a1a2e;
            line-height: 1.4;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 18px 20px;
            background: white;
            border: 3px solid #e2e8f0;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
            font-size: 1.05em;
            font-weight: 600;
            color: #333;
        }

        .option-btn:hover {
            border-color: #8338ec;
            background: linear-gradient(135deg, #faf5ff, #f3e8ff);
            transform: translateX(5px);
        }

        .option-btn .opt-emoji {
            font-size: 1.8em;
        }

        /* RESULT SCREEN */
        .result-frame {
            text-align: center;
            padding: 30px 20px;
            background: linear-gradient(135deg, #f8fafc, #e2e8f0);
            border-radius: 20px;
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
        }

        .result-frame::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(45deg,
                    transparent,
                    transparent 10px,
                    rgba(255, 255, 255, 0.5) 10px,
                    rgba(255, 255, 255, 0.5) 20px);
            pointer-events: none;
        }

        .rank-display {
            position: relative;
            z-index: 1;
        }

        .rank-emoji-big {
            font-size: 5em;
            margin-bottom: 10px;
            animation: float 2s ease infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .rank-letter {
            font-size: 5em;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 10px;
        }

        .rank-S {
            color: #00c853;
            text-shadow: 0 0 20px rgba(0, 200, 83, 0.3);
        }

        .rank-A {
            color: #64dd17;
            text-shadow: 0 0 20px rgba(100, 221, 23, 0.3);
        }

        .rank-B {
            color: #ff9100;
            text-shadow: 0 0 20px rgba(255, 145, 0, 0.3);
        }

        .rank-C {
            color: #ff1744;
            text-shadow: 0 0 20px rgba(255, 23, 68, 0.3);
        }

        .rank-D {
            color: #212121;
            text-shadow: 0 0 20px rgba(33, 33, 33, 0.3);
        }

        .rank-title {
            font-size: 1.5em;
            font-weight: 700;
            color: #333;
            margin-bottom: 15px;
        }

        .rank-comment {
            font-size: 1.1em;
            color: #555;
            font-weight: 600;
            line-height: 1.5;
        }

        .score-box {
            display: inline-block;
            background: #1a1a2e;
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 1.1em;
            font-weight: 700;
            margin: 20px 0;
        }

        .final-remark {
            background: linear-gradient(135deg, #fff5f5, #ffe0e0);
            border-left: 5px solid #ff006e;
            padding: 15px 20px;
            border-radius: 0 12px 12px 0;
            font-size: 1.1em;
            font-weight: 700;
            color: #c53030;
            margin-bottom: 25px;
            font-style: italic;
        }

        .share-section {
            margin-bottom: 20px;
        }

        .share-title {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .share-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn-share {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 1em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-x {
            background: #1a1a2e;
            color: white;
        }

        .btn-x:hover {
            background: #333;
            transform: scale(1.05);
        }

        .btn-line {
            background: #06c755;
            color: white;
        }

        .btn-line:hover {
            background: #05a349;
            transform: scale(1.05);
        }

        .btn-retry {
            width: 100%;
            padding: 18px;
            background: white;
            border: 3px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1em;
            font-weight: 700;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-retry:hover {
            border-color: #8338ec;
            color: #8338ec;
            background: #faf5ff;
        }

        .hidden {
            display: none;
        }

        .fade-in {
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Confetti */
        .confetti {
            position: fixed;
            width: 12px;
            height: 12px;
            top: -12px;
            animation: confettiFall 4s ease-out forwards;
            z-index: 1000;
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        @media (max-width: 480px) {
            .screen {
                padding: 30px 20px;
                border-radius: 20px;
            }

            .app-title {
                font-size: 1.6em;
            }

            .main-icon {
                font-size: 5em;
            }

            .rank-letter {
                font-size: 4em;
            }

            .rank-emoji-big {
                font-size: 4em;
            }

            .question-text {
                font-size: 1.2em;
            }

            .option-btn {
                padding: 15px;
                font-size: 0.95em;
            }
        }
    </style>
</head>

<body>
    <div class="app-container">
        <!-- START SCREEN -->
        <div class="screen" id="startScreen">
            <div class="start-content">
                <div class="trend-badge">🔥 今SNSでバズり中</div>
                <div class="main-icon">🎓💀</div>
                <h1 class="app-title">学生の<br>人生ヤバさ診断</h1>
                <p class="app-subtitle">あなたはまだ人間か、<br>それとも終わっているか</p>

                <div class="warning-box">
                    ⚠️ 診断結果は全て真実です<br>覚悟してお進みください
                </div>

                <div class="feature-list">
                    <div class="feature-item">
                        <span>📊</span>
                        6問診断
                    </div>
                    <div class="feature-item">
                        <span>🎯</span>
                        5段階判定
                    </div>
                    <div class="feature-item">
                        <span>📱</span>
                        シェア可
                    </div>
                </div>

                <button class="btn-primary" onclick="startQuiz()">
                    🚀 診断スタート
                </button>
            </div>
        </div>

        <!-- QUIZ SCREEN -->
        <div class="screen hidden" id="quizScreen">
            <div class="progress-container">
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progressBar" style="width: 16%;"></div>
                </div>
                <div class="progress-text">Question <span id="qCurrent">1</span> / <span id="qTotal">6</span></div>
            </div>

            <div class="question-header">
                <div class="question-number">QUESTION <span id="qNum">1</span></div>
                <span class="question-emoji" id="qEmoji">🌅</span>
                <h2 class="question-text" id="qText">読み込み中...</h2>
            </div>

            <div class="options-container" id="options">
                <!-- Options injected by JS -->
            </div>
        </div>

        <!-- RESULT SCREEN -->
        <div class="screen hidden" id="resultScreen">
            <div class="result-frame">
                <div class="rank-display">
                    <div class="rank-emoji-big" id="rankEmoji">🏆</div>
                    <div class="rank-letter" id="rankLetter">S</div>
                    <div class="rank-title" id="rankTitle">奇跡の人間</div>
                    <div class="rank-comment" id="rankComment">社会にまだ適応している貴重な存在</div>
                </div>
            </div>

            <div class="score-box" id="scoreBox">スコア: 0点</div>

            <div class="final-remark" id="finalRemark">
                💬 「改善方法：そのままでOK」
            </div>

            <div class="share-section">
                <div class="share-title">📤 結果をシェアしてね！</div>
                <div class="share-buttons">
                    <button class="btn-share btn-x" onclick="shareToX()">𝕏 Xでシェア</button>
                    <button class="btn-share btn-line" onclick="shareToLine()">💬 LINE</button>
                </div>
            </div>

            <button class="btn-retry" onclick="restartQuiz()">
                🔄 もう一度診断する
            </button>
        </div>
    </div>

    <script>
        const questions = [
            {
                q: "朝起きて最初にすることは？",
                emoji: "🌅",
                opts: [
                    { txt: "顔洗って朝ごはん", emoji: "🧼", score: 0 },
                    { txt: "スマホチェック", emoji: "📱", score: 3 },
                    { txt: "二度寝する", emoji: "😴", score: 7 },
                    { txt: "昼まで寝る", emoji: "🛌", score: 10 }
                ]
            },
            {
                q: "課題の提出タイミングは？",
                emoji: "📚",
                opts: [
                    { txt: "余裕で前日", emoji: "✅", score: 0 },
                    { txt: "前日ギリギリ", emoji: "⏰", score: 3 },
                    { txt: "当日ギリギリ", emoji: "⚡", score: 7 },
                    { txt: "出さない", emoji: "💀", score: 10 }
                ]
            },
            {
                q: "1日のスマホ時間は？",
                emoji: "📱",
                opts: [
                    { txt: "〜2時間", emoji: "🌱", score: 0 },
                    { txt: "3〜5時間", emoji: "📲", score: 3 },
                    { txt: "6〜10時間", emoji: "🔥", score: 7 },
                    { txt: "気づいたら終わってる", emoji: "☠️", score: 10 }
                ]
            },
            {
                q: "テスト前の行動は？",
                emoji: "📝",
                opts: [
                    { txt: "ちゃんと勉強", emoji: "📖", score: 0 },
                    { txt: "前日から慌てる", emoji: "😰", score: 3 },
                    { txt: "一夜漬け", emoji: "🌙", score: 7 },
                    { txt: "現実逃避", emoji: "🏃", score: 10 }
                ]
            },
            {
                q: "将来について考えてる？",
                emoji: "🤔",
                opts: [
                    { txt: "具体的に考えてる", emoji: "✨", score: 0 },
                    { txt: "漠然と考えてる", emoji: "💭", score: 3 },
                    { txt: "たまに", emoji: "🤷", score: 7 },
                    { txt: "考えたら負け", emoji: "🙈", score: 10 }
                ]
            },
            {
                q: "寝る時間は？",
                emoji: "🌙",
                opts: [
                    { txt: "22時〜24時", emoji: "😴", score: 0 },
                    { txt: "0時〜1時", emoji: "🌃", score: 3 },
                    { txt: "2時〜3時", emoji: "🦉", score: 7 },
                    { txt: "朝まで", emoji: "🧛", score: 10 }
                ]
            }
        ];

        const ranks = {
            S: { emoji: "🏆", title: "奇跡の人間", comment: "社会にまだ適応している貴重な存在。保護対象。", remarks: ["改善方法：そのままでOK", "尊い存在すぎる", "周りの手本になれ"] },
            A: { emoji: "🌱", title: "まだ戻れる", comment: "ギリ人間。今なら間に合う。", remarks: ["改善方法：今すぐ行動", "警報が鳴ってる", "まだ間に合う、今なら"] },
            B: { emoji: "⚠️", title: "終わりの入り口", comment: "気づいてるけどやめられないタイプ。", remarks: ["改善方法：スマホ捨てろ", "自覚があるのが怖い", "止められない衝動"] },
            C: { emoji: "💀", title: "ほぼ終わり", comment: "生活がバグってる。修正不可。", remarks: ["改善方法：知らん", "とりあえず寝ろ", "親が泣いてる"] },
            D: { emoji: "👑", title: "伝説", comment: "ここまで来ると逆に誇れ。もう戻るな。", remarks: ["改善方法：もう無理", "この道を極めろ", "伝説は続く"] }
        };

        let currentQ = 0, totalScore = 0;

        function startQuiz() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('quizScreen').classList.remove('hidden');
            document.getElementById('quizScreen').classList.add('fade-in');
            currentQ = 0; totalScore = 0;
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentQ];
            document.getElementById('qCurrent').textContent = currentQ + 1;
            document.getElementById('qNum').textContent = currentQ + 1;
            document.getElementById('qTotal').textContent = questions.length;
            document.getElementById('qText').textContent = q.q;
            document.getElementById('qEmoji').textContent = q.emoji;

            const progress = ((currentQ + 1) / questions.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';

            const optsDiv = document.getElementById('options');
            optsDiv.innerHTML = '';

            q.opts.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `<span class="opt-emoji">${opt.emoji}</span> ${opt.txt}`;
                btn.onclick = () => select(opt.score);
                btn.style.animation = `fadeIn 0.4s ease ${i * 0.1}s both`;
                optsDiv.appendChild(btn);
            });
        }

        function select(score) {
            totalScore += score;
            currentQ++;
            if (currentQ < questions.length) showQuestion();
            else showResult();
        }

        function showResult() {
            document.getElementById('quizScreen').classList.add('hidden');
            document.getElementById('resultScreen').classList.remove('hidden');
            document.getElementById('resultScreen').classList.add('fade-in');

            let rank;
            if (totalScore <= 15) rank = 'S';
            else if (totalScore <= 30) rank = 'A';
            else if (totalScore <= 45) rank = 'B';
            else if (totalScore <= 60) rank = 'C';
            else rank = 'D';

            const r = ranks[rank];
            document.getElementById('rankEmoji').textContent = r.emoji;
            document.getElementById('rankLetter').textContent = rank;
            document.getElementById('rankLetter').className = 'rank-letter rank-' + rank;
            document.getElementById('rankTitle').textContent = r.title;
            document.getElementById('rankComment').textContent = r.comment;
            document.getElementById('scoreBox').textContent = `スコア: ${totalScore}点`;

            const remark = r.remarks[Math.floor(Math.random() * r.remarks.length)];
            document.getElementById('finalRemark').textContent = `💬 「${remark}」`;

            // Confetti
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const c = document.createElement('div');
                    c.className = 'confetti';
                    c.style.left = Math.random() * 100 + 'vw';
                    c.style.background = ['#ff006e', '#8338ec', '#3a86ff', '#06ffa5', '#ffbe0b'][Math.floor(Math.random() * 5)];
                    c.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    document.body.appendChild(c);
                    setTimeout(() => c.remove(), 4000);
                }, i * 30);
            }
        }

        function shareToX() {
            const rank = document.getElementById('rankLetter').textContent;
            const title = document.getElementById('rankTitle').textContent;
            const score = totalScore;
            const text = `【学生の人生ヤバさ診断】\n私の結果は「${rank}ランク：${title}」\nスコア: ${score}点\n\nこれ当たってて普通に怖いｗ\nあなたも診断してみて！\n#人生ヤバさ診断 #学生`;
            const url = window.location.href;
            window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`, '_blank');
        }

        function shareToLine() {
            const rank = document.getElementById('rankLetter').textContent;
            const title = document.getElementById('rankTitle').textContent;
            const text = `【学生の人生ヤバさ診断】\n私の結果は「${rank}ランク：${title}」\n\nこれ当たってて普通に怖いｗ\nあなたも診断してみて！`;
            const url = window.location.href;
            window.open(`https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(url)}&text=${encodeURIComponent(text)}`, '_blank');
        }

        function restartQuiz() {
            document.getElementById('resultScreen').classList.add('hidden');
            document.getElementById('startScreen').classList.remove('hidden');
            document.getElementById('startScreen').classList.add('fade-in');
        }
    </script>
